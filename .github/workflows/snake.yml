name: generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"    # 每天 00:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main
      # 如果默认分支是 master，请改为：
      # - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # 这里不要用 $BUILD_DIR/$TARGET_DIR 这类 shell 变量！
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      # ↑ 官方推荐用法就是在 outputs 中每行写一个相对路径。[1](https://goobar.dev/manually-triggering-github-actions-workflows/)

      - name: List generated files (debug)
        run: |
          echo "Working dir: $PWD"
          ls -al
          echo "---- dist ----"
          ls -al dist || true

      # 如要放到和 metrics.svg 一样的目录（假设在仓库根目录）：
      - name: Move files into target directory
        run: |
          mkdir -p "."
          cp "dist/github-contribution-grid-snake.svg" "."
          cp "dist/github-contribution-grid-snake-dark.svg" "."

      - name: Commit generated SVGs (use same PAT as metrics)
        uses: EndBug/add-and-commit@v9
        with:
          add: |
            ./github-contribution-grid-snake.svg
            ./github-contribution-grid-snake-dark.svg
          message: "chore: update contribution snake SVGs"
          default_author: github_actions
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
